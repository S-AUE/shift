<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="シフト希望">
<title>シフト希望</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23FF2D78'/><rect x='18' y='28' width='64' height='58' rx='6' fill='white'/><rect x='18' y='18' width='64' height='24' rx='6' fill='white'/><rect x='28' y='14' width='8' height='16' rx='4' fill='%23FF2D78'/><rect x='64' y='14' width='8' height='16' rx='4' fill='%23FF2D78'/><rect x='18' y='34' width='64' height='4' fill='%23FF2D78' opacity='.2'/><rect x='26' y='50' width='12' height='12' rx='3' fill='%23FF2D78'/><rect x='44' y='50' width='12' height='12' rx='3' fill='%23FF2D78' opacity='.3'/><rect x='62' y='50' width='12' height='12' rx='3' fill='%23FF2D78' opacity='.3'/><rect x='26' y='68' width='12' height='12' rx='3' fill='%23FF2D78' opacity='.3'/><rect x='44' y='68' width='12' height='12' rx='3' fill='%23FF2D78'/><rect x='62' y='68' width='12' height='12' rx='3' fill='%23FF2D78'/></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#FF2D78;--pink-light:#FFE0ED;--pink-mid:#FFB3D1;--pink-dark:#C4005A;
  --ac:#FF2D78;--ac-light:#FFE0ED;--ac-mid:#FFB3D1;--ac-dark:#C4005A;
  --red:#FF1744;--red-light:#FFE8EE;--red-mid:#FF8099;--red-dark:#C4001A;
  --blue:#2979FF;--blue-light:#E8F0FF;--blue-mid:#82B0FF;--blue-dark:#0050CB;
  --green:#00E676;--green-light:#E0FFF3;--green-mid:#7FFFD0;--green-dark:#00A152;
  --yellow:#FFD600;--yellow-light:#FFFBE0;--yellow-mid:#FFE97A;--yellow-dark:#C7A000;
  --bg:#F7F6F2;--surface:#FFFFFF;--border:rgba(0,0,0,0.1);
  --text:#1a1a1a;--muted:#888;--radius:12px;--rsm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:12px;max-width:480px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.app-title{font-size:18px;font-weight:700;color:var(--ac)}
.topbar-right{display:flex;gap:6px;align-items:center}
.lang-btn,.color-toggle{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:5px 10px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text);font-family:inherit}
.lang-btn:active,.color-toggle:active{opacity:.7}
.header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.nav-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:6px 14px;cursor:pointer;font-size:16px;color:var(--text);font-family:inherit}
.nav-btn:active{opacity:.7}
.month-label{font-size:18px;font-weight:700;flex:1;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.day-header{text-align:center;font-size:11px;font-weight:600;color:var(--muted);padding:3px 0}
.day-header.sun{color:#E53935}
.day-header.sat{color:#1565C0}
.day-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:4px 3px;min-height:52px;cursor:pointer;-webkit-tap-highlight-color:transparent;overflow:hidden}
.day-cell:active{opacity:.75}
.day-cell.empty{border-color:transparent;background:none;cursor:default;pointer-events:none}
.day-cell.selected{border:2px solid var(--ac);background:var(--ac-light)}
.day-cell.holiday{background:#FFF8F0}
.day-cell.selected.holiday{background:var(--ac-light)}
.day-num{font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap}
.day-cell.sun .day-num,.day-cell.holiday .day-num{color:#E53935}
.day-cell.sat .day-num{color:#1565C0}
.holiday-name{font-size:8px;color:#E53935;line-height:1.1;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.day-time{font-size:9px;color:var(--ac-dark);background:var(--ac-mid);border-radius:3px;padding:1px 3px;display:block;margin-top:2px;white-space:normal;word-break:break-all;line-height:1.3}
.summary-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.summary-title{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em}
.summary-list{font-size:14px;line-height:2;color:var(--text);white-space:pre-wrap;min-height:36px}
.empty-note{color:var(--muted);font-size:13px}
.copy-btn{margin-top:12px;width:100%;background:var(--ac);color:#fff;border:none;border-radius:var(--rsm);padding:11px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer}
.copy-btn:active{opacity:.8}
.color-panel{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:12px}
.color-panel.open{display:block}
.color-panel-title{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em}
.color-swatches{display:flex;gap:10px;flex-wrap:wrap}
.swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s}
.swatch.active{border-color:var(--text)}
.swatch:active{opacity:.8}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:20px 20px calc(24px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:17px;font-weight:700;margin-bottom:14px}
.time-check{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:14px;cursor:pointer}
.time-check input[type=checkbox]{width:18px;height:18px;accent-color:var(--ac);cursor:pointer}
.time-fields{display:none}
.time-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.time-row label{font-size:13px;color:var(--muted);width:36px}
.time-row input[type=time]{flex:1;border:1px solid var(--border);border-radius:var(--rsm);padding:8px 10px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--text)}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns button{flex:1;padding:11px;border-radius:var(--rsm);font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text)}
.modal-btns .btn-ok{background:var(--ac);color:#fff;border-color:var(--ac)}
.modal-btns .btn-del{color:#E53935;border-color:#EF9A9A;background:#FFEBEE}
</style>
</head>
<body>
<div class="topbar">
  <div class="app-title" id="app-title">シフト希望</div>
  <div class="topbar-right">
    <button class="color-toggle" id="color-toggle">🎨</button>
    <button class="lang-btn" id="lang-btn">EN</button>
  </div>
</div>
 
<div class="color-panel" id="color-panel">
  <div class="color-panel-title" id="color-panel-title">テーマカラー</div>
  <div class="color-swatches">
    <div class="swatch active" data-color="pink" style="background:#FF2D78"></div>
    <div class="swatch" data-color="blue" style="background:#2979FF"></div>
    <div class="swatch" data-color="green" style="background:#00C853"></div>
    <div class="swatch" data-color="red" style="background:#FF1744"></div>
    <div class="swatch" data-color="yellow" style="background:#FFD600"></div>
  </div>
</div>
 
<div class="header">
  <button class="nav-btn" id="prev">&#8592;</button>
  <div class="month-label" id="month-label"></div>
  <button class="nav-btn" id="next">&#8594;</button>
</div>
<div class="cal-grid" id="cal"></div>
<div class="summary-box">
  <div class="summary-title" id="summary-title">希望一覧</div>
  <div class="summary-list" id="summary"></div>
  <button class="copy-btn" id="copy-btn">テキストをコピー</button>
</div>
 
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modal-title"></h3>
    <label class="time-check">
      <input type="checkbox" id="use-time">
      <span id="lbl-time-check">時間を指定する</span>
    </label>
    <div class="time-fields" id="time-fields">
      <div class="time-row">
        <label id="lbl-start">開始</label>
        <input type="time" id="t-start" value="09:00">
      </div>
      <div class="time-row">
        <label id="lbl-end">終了</label>
        <input type="time" id="t-end" value="17:00">
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-del" id="btn-del">削除</button>
      <button id="btn-cancel">キャンセル</button>
      <button class="btn-ok" id="btn-ok">OK</button>
    </div>
  </div>
</div>
 
<script>
const HOLIDAYS_JP = {
  "2025-1-1":"元日","2025-1-13":"成人の日","2025-2-11":"建国記念の日","2025-2-23":"天皇誕生日",
  "2025-3-20":"春分の日","2025-4-29":"昭和の日","2025-5-3":"憲法記念日","2025-5-4":"みどりの日",
  "2025-5-5":"こどもの日","2025-7-21":"海の日","2025-8-11":"山の日","2025-9-15":"敬老の日",
  "2025-9-23":"秋分の日","2025-10-13":"スポーツの日","2025-11-3":"文化の日","2025-11-23":"勤労感謝の日",
  "2026-1-1":"元日","2026-1-12":"成人の日","2026-2-11":"建国記念の日","2026-2-23":"天皇誕生日",
  "2026-3-20":"春分の日","2026-4-29":"昭和の日","2026-5-3":"憲法記念日","2026-5-4":"みどりの日",
  "2026-5-5":"こどもの日","2026-5-6":"振替休日","2026-7-20":"海の日","2026-8-11":"山の日",
  "2026-9-21":"敬老の日","2026-9-22":"秋分の日","2026-10-12":"スポーツの日","2026-11-3":"文化の日",
  "2026-11-23":"勤労感謝の日","2026-12-23":"天皇誕生日振替",
  "2027-1-1":"元日","2027-1-11":"成人の日","2027-2-11":"建国記念の日","2027-2-23":"天皇誕生日",
  "2027-3-21":"春分の日","2027-4-29":"昭和の日","2027-5-3":"憲法記念日","2027-5-4":"みどりの日",
  "2027-5-5":"こどもの日"
};
const HOLIDAYS_EN = {
  "2025-1-1":"New Year","2025-1-13":"Coming of Age","2025-2-11":"Foundation Day","2025-2-23":"Emperor's Birthday",
  "2025-3-20":"Vernal Equinox","2025-4-29":"Showa Day","2025-5-3":"Constitution Day","2025-5-4":"Greenery Day",
  "2025-5-5":"Children's Day","2025-7-21":"Marine Day","2025-8-11":"Mountain Day","2025-9-15":"Respect for the Aged",
  "2025-9-23":"Autumnal Equinox","2025-10-13":"Sports Day","2025-11-3":"Culture Day","2025-11-23":"Labour Day",
  "2026-1-1":"New Year","2026-1-12":"Coming of Age","2026-2-11":"Foundation Day","2026-2-23":"Emperor's Birthday",
  "2026-3-20":"Vernal Equinox","2026-4-29":"Showa Day","2026-5-3":"Constitution Day","2026-5-4":"Greenery Day",
  "2026-5-5":"Children's Day","2026-5-6":"Holiday","2026-7-20":"Marine Day","2026-8-11":"Mountain Day",
  "2026-9-21":"Respect for the Aged","2026-9-22":"Autumnal Equinox","2026-10-12":"Sports Day",
  "2026-11-3":"Culture Day","2026-11-23":"Labour Day",
  "2027-1-1":"New Year","2027-1-11":"Coming of Age","2027-2-11":"Foundation Day","2027-2-23":"Emperor's Birthday",
  "2027-3-21":"Vernal Equinox","2027-4-29":"Showa Day","2027-5-3":"Constitution Day","2027-5-4":"Greenery Day",
  "2027-5-5":"Children's Day"
};
 
const COLORS = {
  pink:  {ac:'#FF2D78',light:'#FFE0ED',mid:'#FFB3D1',dark:'#C4005A'},
  blue:  {ac:'#2979FF',light:'#E8F0FF',mid:'#82B0FF',dark:'#0050CB'},
  green: {ac:'#00C853',light:'#E0FFF3',mid:'#7FFFD0',dark:'#007A33'},
  red:   {ac:'#FF1744',light:'#FFE8EE',mid:'#FF8099',dark:'#C4001A'},
  yellow:{ac:'#FFD600',light:'#FFFBE0',mid:'#FFE97A',dark:'#C7A000'}
};
 
const T = {
  ja:{
    title:'シフト希望',colorPanel:'テーマカラー',summaryTitle:'希望一覧',
    copyBtn:'テキストをコピー',copied:'コピーしました！',
    timeCheck:'時間を指定する',start:'開始',end:'終了',
    del:'削除',cancel:'キャンセル',ok:'OK',
    empty:'日付をタップして希望を追加',
    dow:['日','月','火','水','木','金','土'],
    dowFull:['日','月','火','水','木','金','土'],
    months:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
    monthLabel:(y,m)=>y+'年'+(m+1)+'月',
    dateLabel:(m,d,dow,hname)=>m+'月'+d+'日（'+dow+'）'+(hname?' 🎌'+hname:''),
    summaryLine:(m,d,dow,s,e,hname)=>m+'月'+d+'日（'+dow+'）'+(hname?' 🎌':'')+(s?' '+s+'〜'+e:''),
  },
  en:{
    title:'Shift Request',colorPanel:'Theme Color',summaryTitle:'Requests',
    copyBtn:'Copy Text',copied:'Copied!',
    timeCheck:'Set time',start:'Start',end:'End',
    del:'Delete',cancel:'Cancel',ok:'OK',
    empty:'Tap a date to add your request',
    dow:['Su','Mo','Tu','We','Th','Fr','Sa'],
    dowFull:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
    months:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    monthLabel:(y,m)=>T.en.months[m]+' '+y,
    dateLabel:(m,d,dow,hname)=>T.en.months[m-1]+' '+d+' ('+dow+')'+(hname?' 🎌'+hname:''),
    summaryLine:(m,d,dow,s,e,hname)=>T.en.months[m-1]+' '+d+' ('+dow+')'+(hname?' 🎌':'')+(s?' '+s+'〜'+e:''),
  }
};
 
let lang = localStorage.getItem('shift_lang')||'ja';
let color = localStorage.getItem('shift_color')||'pink';
let selected = JSON.parse(localStorage.getItem('shift_data')||'{}');
let currentYear, currentMonth, editKey;
 
function save(){localStorage.setItem('shift_data',JSON.stringify(selected));}
function saveLang(){localStorage.setItem('shift_lang',lang);}
function saveColor(){localStorage.setItem('shift_color',color);}
 
function applyColor(){
  const c = COLORS[color];
  const r = document.documentElement.style;
  r.setProperty('--ac',c.ac);
  r.setProperty('--ac-light',c.light);
  r.setProperty('--ac-mid',c.mid);
  r.setProperty('--ac-dark',c.dark);
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.color===color));
}
 
function t(){return T[lang];}
 
function getHoliday(y,m,d){
  const key=y+'-'+m+'-'+d;
  return lang==='ja'?(HOLIDAYS_JP[key]||null):(HOLIDAYS_EN[key]||null);
}
 
function updateLabels(){
  document.getElementById('app-title').textContent=t().title;
  document.getElementById('lang-btn').textContent=lang==='ja'?'EN':'JA';
  document.getElementById('color-panel-title').textContent=t().colorPanel;
  document.getElementById('summary-title').textContent=t().summaryTitle;
  document.getElementById('copy-btn').textContent=t().copyBtn;
  document.getElementById('lbl-time-check').textContent=t().timeCheck;
  document.getElementById('lbl-start').textContent=t().start;
  document.getElementById('lbl-end').textContent=t().end;
  document.getElementById('btn-del').textContent=t().del;
  document.getElementById('btn-cancel').textContent=t().cancel;
  document.getElementById('btn-ok').textContent=t().ok;
}
 
function initMonth(){
  const now=new Date();
  let y=now.getFullYear(),m=now.getMonth()+2;
  if(m>11){y++;m=0;}
  currentYear=y;currentMonth=m;
}
 
function render(){
  const y=currentYear,m=currentMonth;
  document.getElementById('month-label').textContent=t().monthLabel(y,m);
  const cal=document.getElementById('cal');
  cal.innerHTML='';
  t().dow.forEach((d,i)=>{
    const h=document.createElement('div');
    h.className='day-header'+(i===0?' sun':i===6?' sat':'');
    h.textContent=d;
    cal.appendChild(h);
  });
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='day-cell empty';cal.appendChild(e);}
  for(let d=1;d<=days;d++){
    const dow=new Date(y,m,d).getDay();
    const key=y+'-'+(m+1)+'-'+d;
    const hname=getHoliday(y,m+1,d);
    const cell=document.createElement('div');
    let cls='day-cell'+(dow===0?' sun':dow===6?' sat':'')+(selected[key]!==undefined?' selected':'')+(hname?' holiday':'');
    cell.className=cls;
    const num=document.createElement('div');num.className='day-num';
    num.textContent=d;
    cell.appendChild(num);
    if(hname){
      const hn=document.createElement('div');hn.className='holiday-name';
      hn.textContent=hname;cell.appendChild(hn);
    }
    if(selected[key]&&selected[key].start){
      const tEl=document.createElement('div');tEl.className='day-time';
      tEl.textContent=selected[key].start+'〜'+selected[key].end;
      cell.appendChild(tEl);
    }
    cell.addEventListener('click',()=>openModal(y,m+1,d,dow,hname));
    cal.appendChild(cell);
  }
  updateSummary();
}
 
function openModal(y,mo,d,dow,hname){
  editKey=y+'-'+mo+'-'+d;
  const dowName=t().dowFull[dow];
  document.getElementById('modal-title').textContent=t().dateLabel(mo,d,dowName,hname);
  const data=selected[editKey]||{};
  const useTime=!!(data&&data.start);
  document.getElementById('use-time').checked=useTime;
  document.getElementById('time-fields').style.display=useTime?'block':'none';
  document.getElementById('t-start').value=data.start||'09:00';
  document.getElementById('t-end').value=data.end||'17:00';
  document.getElementById('modal-bg').classList.add('open');
}
 
document.getElementById('use-time').addEventListener('change',function(){
  document.getElementById('time-fields').style.display=this.checked?'block':'none';
});
document.getElementById('modal-bg').addEventListener('click',function(e){
  if(e.target===this)this.classList.remove('open');
});
document.getElementById('btn-cancel').addEventListener('click',()=>document.getElementById('modal-bg').classList.remove('open'));
document.getElementById('btn-del').addEventListener('click',()=>{
  delete selected[editKey];save();
  document.getElementById('modal-bg').classList.remove('open');render();
});
document.getElementById('btn-ok').addEventListener('click',()=>{
  if(document.getElementById('use-time').checked){
    selected[editKey]={start:document.getElementById('t-start').value,end:document.getElementById('t-end').value};
  }else{selected[editKey]={};}
  save();document.getElementById('modal-bg').classList.remove('open');render();
});
document.getElementById('prev').addEventListener('click',()=>{
  currentMonth--;if(currentMonth<0){currentYear--;currentMonth=11;}render();
});
document.getElementById('next').addEventListener('click',()=>{
  currentMonth++;if(currentMonth>11){currentYear++;currentMonth=0;}render();
});
document.getElementById('lang-btn').addEventListener('click',()=>{
  lang=lang==='ja'?'en':'ja';saveLang();updateLabels();render();
});
document.getElementById('color-toggle').addEventListener('click',()=>{
  document.getElementById('color-panel').classList.toggle('open');
});
document.querySelectorAll('.swatch').forEach(s=>s.addEventListener('click',()=>{
  color=s.dataset.color;saveColor();applyColor();
}));
 
function updateSummary(){
  const keys=Object.keys(selected).sort((a,b)=>{
    const [ay,am,ad]=a.split('-').map(Number);
    const [by,bm,bd]=b.split('-').map(Number);
    return new Date(ay,am-1,ad)-new Date(by,bm-1,bd);
  });
  if(!keys.length){
    document.getElementById('summary').innerHTML='<span class="empty-note">'+t().empty+'</span>';return;
  }
  const lines=keys.map(k=>{
    const [y,m,d]=k.split('-').map(Number);
    const dow=new Date(y,m-1,d).getDay();
    const dowName=t().dowFull[dow];
    const data=selected[k];
    const hname=getHoliday(y,m,d);
    return t().summaryLine(m,d,dowName,data&&data.start,data&&data.end,hname);
  });
  document.getElementById('summary').textContent=lines.join('\n');
}
 
document.getElementById('copy-btn').addEventListener('click',()=>{
  const text=document.getElementById('summary').textContent;
  if(!text||text.includes(t().empty.slice(0,4)))return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent=t().copied;
    setTimeout(()=>btn.textContent=t().copyBtn,1800);
  });
});
 
applyColor();updateLabels();initMonth();render();
</script>
</body>
</html>
